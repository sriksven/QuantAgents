version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-quantagents}:${POSTGRES_PASSWORD:-quantagents_secret}@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-supersecret}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: "yfinance pandas numpy requests httpx great-expectations dvc"
  volumes:
    - ./data-pipeline/dags:/opt/airflow/dags
    - ./data-pipeline/scripts:/opt/airflow/scripts
    - ./data-pipeline/great_expectations:/opt/airflow/great_expectations
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  # ─── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: quantagents-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantagents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantagents_secret}
      POSTGRES_DB: ${POSTGRES_DB:-quantagents}
      # Airflow needs its own DB
      POSTGRES_MULTIPLE_DATABASES: quantagents,airflow,mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-quantagents}"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quantagents-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ─── Qdrant ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: quantagents-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  # ─── Langfuse 2 ─────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:2
    container_name: quantagents-langfuse
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-quantagents}:${POSTGRES_PASSWORD:-quantagents_secret}@postgres:5432/quantagents
      NEXTAUTH_SECRET: supersecret
      NEXTAUTH_URL: http://localhost:3001
      SALT: supersalt
      TELEMETRY_ENABLED: "false"
    ports:
      - "3001:3000"
    restart: unless-stopped

  # ─── MLflow ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: quantagents-mlflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-quantagents}:${POSTGRES_PASSWORD:-quantagents_secret}@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlartifacts
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-quantagents}:${POSTGRES_PASSWORD:-quantagents_secret}@postgres:5432/mlflow
      --default-artifact-root /mlartifacts
      --host 0.0.0.0
      --port 5001
    ports:
      - "5001:5001"
    volumes:
      - mlflow-artifacts:/mlartifacts
    restart: unless-stopped

  # ─── Airflow Webserver ──────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: quantagents-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ─── Airflow Scheduler ──────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: quantagents-airflow-scheduler
    command: scheduler
    restart: unless-stopped

  # ─── Airflow Init (one-time) ────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: quantagents-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname QuantAgents \
          --lastname Admin \
          --role Admin \
          --email admin@quantagents.local \
          --password admin
    environment:
      <<: *airflow-common-env
    restart: on-failure

  # ─── Backend (FastAPI) ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    container_name: quantagents-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-quantagents}:${POSTGRES_PASSWORD:-quantagents_secret}@postgres:5432/${POSTGRES_DB:-quantagents}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  mlflow-artifacts:
  airflow-logs:
  airflow-plugins:
