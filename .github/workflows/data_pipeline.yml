name: Data Pipeline

on:
  schedule:
    - cron: "0 23 * * 1-5"  # 6 PM EST (11 PM UTC), Mon-Fri
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers to fetch (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (validate only, no write)"
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}

jobs:
  fetch-and-validate:
    name: Fetch + Validate Market Data
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-data-${{ runner.os }}-${{ hashFiles('data-pipeline/requirements.txt') }}
          restore-keys: pip-data-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install --quiet \
            yfinance pandas numpy requests pyarrow \
            great-expectations dvc structlog \
            xgboost scikit-learn scipy optuna

      - name: Configure DVC remote
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc remote add -d s3remote s3://quantagents-data/dvc || echo "DVC remote already configured"
          dvc remote modify s3remote region us-east-1 || true

      # ── Fetch raw data ─────────────────────────────────────────────────────

      - name: Fetch OHLCV prices (yfinance)
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          TICKERS_OVERRIDE: ${{ github.event.inputs.tickers }}
        run: python data-pipeline/scripts/fetch_prices.py

      - name: Fetch SEC filings (EDGAR)
        run: python data-pipeline/scripts/fetch_filings.py

      - name: Fetch options chains
        run: python data-pipeline/scripts/fetch_options.py

      - name: Fetch news + sentiment (Tavily)
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python data-pipeline/scripts/fetch_news.py

      # ── Preprocess + quality checks ────────────────────────────────────────

      - name: Preprocess (normalise, feature engineering)
        run: python data-pipeline/scripts/preprocess.py

      - name: Schema validation (Great Expectations)
        id: schema_validation
        run: python data-pipeline/scripts/validate_schema.py

      - name: Anomaly detection (Isolation Forest)
        id: anomaly_detection
        run: |
          python data-pipeline/scripts/detect_anomalies.py
          echo "anomaly_count=$(cat /tmp/anomaly_count.txt 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT

      - name: Fail if anomaly count > threshold
        if: ${{ fromJson(steps.anomaly_detection.outputs.anomaly_count || '0') > 50 }}
        run: |
          echo "Too many anomalies detected: ${{ steps.anomaly_detection.outputs.anomaly_count }}"
          exit 1

      # ── Generate ML training data (incremental refresh) ────────────────────

      - name: Refresh training data (incremental)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: backend
        run: python -c "from ml.data_generator import generate_all; generate_all(verbose=True)"

      # ── DVC version data ───────────────────────────────────────────────────

      - name: Version data with DVC
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          dvc add data/ backend/data/ || true
          git config user.email "gh-actions@quantagents.ai"
          git config user.name "GitHub Actions"
          git add .dvc/ *.dvc 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "chore: DVC data snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          dvc push || echo "DVC push skipped (no remote credentials)"

      # ── Summary ───────────────────────────────────────────────────────────

      - name: Write job summary
        if: always()
        run: |
          echo "## Data Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Anomalies**: ${{ steps.anomaly_detection.outputs.anomaly_count || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Schema check**: ${{ steps.schema_validation.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run**: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY

      # ── Notifications ─────────────────────────────────────────────────────

      - name: Notify success
        if: success() && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != ''
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ env.SLACK_CHANNEL_ID }}
          payload: |
            {"text": ":white_check_mark: *Data Pipeline completed successfully* — $(date -u +%Y-%m-%d)"}
        continue-on-error: true

      - name: Notify failure
        if: failure() && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != ''
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ env.SLACK_CHANNEL_ID }}
          payload: |
            {
              "text": ":red_circle: *Data Pipeline FAILED*",
              "attachments": [{
                "color": "#ff0000",
                "fields": [
                  {"title": "Run", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
                ]
              }]
            }
        continue-on-error: true
